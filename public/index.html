<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamMind AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <header>
            <h1>StreamMind <span class="highlight">AI</span></h1>
            <p>Real-time websocket streaming intelligence natively engineered.</p>
        </header>

        <main class="chat-interface">
            <div id="chat-box" class="chat-box glass-panel">
                <div class="message system-msg">Connected to WebSockets. Ready for prompts.</div>
            </div>

            <div class="input-area">
                <input type="text" id="prompt-input" placeholder="Type your prompt here..." autocomplete="off">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
